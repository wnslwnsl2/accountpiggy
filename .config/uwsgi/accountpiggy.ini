[uwsgi]
chdir = /srv/accountpiggy/
module = sitee.wsgi:application
home = /home/ubuntu/accountpiggy/

uid = deploy
gid = deploy

http =:8080

enable-threads = true
master = true
vacuum = true
pidfile = /tmp/mysite.pid
logto = /var/log/uwsgi/accountpiggy/@(exec://date +%%Y-%%m-%%d).log
log-reopen = true