{% if recv_item_list %}
{% for recv_item in recv_item_list %}
<li>
    <input type="hidden" name="entry_id" value="{{recv_item.id}}">
    <span>{{ recv_item.sender.nickname }} {{recv_item.value}}원</span>
    <a class="btn btn-outline-dark button_recv state{{recv_item.state}}" href="{% url 'accountpiggy:transfer_receiver_communication' room.id %}">
        받았다.
    </a>{{recv_item.state}}
</li>
{% endfor %}
{% endif %}
