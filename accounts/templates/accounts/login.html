{% extends 'accountpiggy/base.html' %}
{% block title %}로그인 페이지{% endblock %}
{% block content %}
<h3>로그인</h3>
<form method="post" action=".">
    {% csrf_token %}
    <p><label>이메일</label><input type="text" name="username"/></p>
    <p><label>비밀번호</label><input type="password" name="password"/></p>
    <input type="submit" value="로그인"/>
    {% for message in messages %}
        <p id="messages">{{message}}</p>
    {% endfor %}
</form>
{% endblock %}
