{% extends 'accountpiggy/base.html' %}
{% block content %}
<form method="post" action=".">
    {% csrf_token %}
    <div class="form-group">
        {% for field in form %}
            <label for="{{field.id_for_label}}">{{field.label}}</label>
            {{field}}
        {% endfor %}
    </div>
    <button type="submit" class="btn btn-dark" name="create_user">회원가입</button>
</form>
{% endblock %}
